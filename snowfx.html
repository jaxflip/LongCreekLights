<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Creek Lights — falling effects</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; height: 100%; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="fx"></canvas>
<script>
(function () {
  'use strict';

  /* Respect reduced-motion: render nothing. */
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  /* ------------------------------------------------------------------
     Artifact sets — one is chosen deterministically from the date and
     rotates every ROTATE_DAYS days (same choice for every visitor).
     Tune sets/sizes freely; commit to GitHub and it's live in a minute.
     ------------------------------------------------------------------ */
  var ROTATE_DAYS = 3;
  var SETS = [
    { name: 'snow',       items: ['❄️', '❅', '❆'],           count: 26, size: [12, 22], speed: [18, 42] },
    { name: 'gifts',      items: ['🎁', '🎀', '❄️'],          count: 18, size: [16, 26], speed: [24, 48] },
    { name: 'candy',      items: ['🍬', '🍭', '❄️'],          count: 20, size: [14, 24], speed: [22, 46] },
    { name: 'bells-stars',items: ['🔔', '⭐', '✨'],           count: 20, size: [14, 24], speed: [20, 44] },
    { name: 'frosty',     items: ['⛄', '🎄', '❄️'],          count: 14, size: [18, 28], speed: [16, 36] },
    { name: 'festive-mix',items: ['🎁', '❄️', '🍬', '⭐', '🔔'], count: 22, size: [13, 24], speed: [20, 46] }
  ];

  var daysSinceEpoch = Math.floor(Date.now() / 86400000);
  var set = SETS[Math.floor(daysSinceEpoch / ROTATE_DAYS) % SETS.length];

  var canvas = document.getElementById('fx');
  var g = canvas.getContext('2d');
  var W = 0, H = 0, DPR = 1;
  var flakes = [];

  function rand(a, b) { return a + Math.random() * (b - a); }

  function makeFlake(fromTop) {
    return {
      x: Math.random() * W,
      y: fromTop ? -30 : Math.random() * H,
      emoji: set.items[Math.floor(Math.random() * set.items.length)],
      size: rand(set.size[0], set.size[1]),
      vy: rand(set.speed[0], set.speed[1]),
      sway: rand(0.4, 1.4),
      phase: Math.random() * Math.PI * 2,
      rot: Math.random() * Math.PI * 2,
      vr: rand(-0.6, 0.6),
      alpha: rand(0.55, 0.95)
    };
  }

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    flakes = [];
    for (var i = 0; i < set.count; i++) flakes.push(makeFlake(false));
  }
  window.addEventListener('resize', resize);
  resize();

  var last = performance.now();
  var running = true;

  function loop(t) {
    if (!running) return;
    var dt = Math.min((t - last) / 1000, 0.05);
    last = t;
    g.clearRect(0, 0, W, H);
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    for (var i = 0; i < flakes.length; i++) {
      var f = flakes[i];
      f.y += f.vy * dt;
      f.x += Math.sin(t / 1000 * f.sway + f.phase) * 14 * dt;
      f.rot += f.vr * dt;
      if (f.y > H + 30) { flakes[i] = makeFlake(true); continue; }
      g.save();
      g.globalAlpha = f.alpha;
      g.translate(f.x, f.y);
      g.rotate(Math.sin(f.rot) * 0.35);
      g.font = f.size + 'px serif';
      g.fillText(f.emoji, 0, 0);
      g.restore();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else if (!running) {
      running = true;
      last = performance.now();
      requestAnimationFrame(loop);
    }
  });
})();
</script>
</body>
</html>
