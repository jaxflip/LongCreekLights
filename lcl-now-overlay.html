<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Creek Lights — Now Card Art</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }
  .lcl-ovl {
    box-sizing: border-box;
    padding: 1.35rem 1rem 1.6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
  }
  .lcl-ovl-hero-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 6px;
    min-height: 0;
  }
  body.lcl-ovl-has-hero .lcl-ovl-hero-wrap {
    min-height: min(58vw, 230px);
  }
  #lcl-ovl-hero {
    width: min(58vw, 230px);
    height: min(58vw, 230px);
    object-fit: cover;
    border-radius: 14px;
    border: 2px solid rgba(255, 209, 102, 0.35);
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.55);
    visibility: hidden;
  }
  .lcl-ovl-gap-title {
    height: clamp(2.2rem, 8vw, 2.8rem);
    flex: 0 0 auto;
    width: 100%;
  }
  .lcl-ovl-gap-now-text {
    min-height: clamp(2.5rem, 10vw, 3.2rem);
    width: 100%;
  }
  .lcl-ovl-next-row {
    width: 100%;
    min-height: 52px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding-left: 8%;
    gap: 10px;
    margin: 6px 0;
    visibility: hidden;
  }
  body.lcl-ovl-has-next .lcl-ovl-next-row {
    visibility: visible;
  }
  #lcl-ovl-next {
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid rgba(255, 209, 102, 0.35);
    flex: 0 0 52px;
  }
  .lcl-ovl-gap-mid {
    height: clamp(4.5rem, 16vw, 6rem);
    width: 100%;
  }
  .lcl-ovl-queue {
    width: 92%;
    max-width: 420px;
    margin: 0 auto;
  }
  .lcl-ovl-queue-row {
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    gap: 10px;
    min-height: 52px;
    margin: 10px 0;
    padding-left: 4%;
  }
  .lcl-ovl-thumb {
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid rgba(255, 209, 102, 0.35);
    flex: 0 0 52px;
  }
  .lcl-ovl-thumb--empty {
    display: inline-block;
    visibility: hidden;
  }
</style>
</head>
<body>
  <div class="lcl-ovl">
    <div class="lcl-ovl-hero-wrap">
      <img id="lcl-ovl-hero" alt="">
    </div>
    <div class="lcl-ovl-gap-title" aria-hidden="true"></div>
    <div class="lcl-ovl-gap-now-text" aria-hidden="true"></div>
    <div class="lcl-ovl-next-row">
      <img id="lcl-ovl-next" alt="">
    </div>
    <div class="lcl-ovl-gap-mid" aria-hidden="true"></div>
    <div class="lcl-ovl-queue" id="lcl-ovl-queue"></div>
  </div>
  <script src="lcl-now-overlay.js"></script>
</body>
</html>
