<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catch the Gift — Long Creek Lights</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(180deg, #0b1f3a 0%, #12365e 100%);
    color: #f5f7fa;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    touch-action: none;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    font-size: 0.95rem;
  }
  header a { color: #ffd166; text-decoration: none; font-weight: 700; padding: 6px 10px; }
  .hud { font-weight: 700; }
  button.mute {
    background: #142c4e;
    border: 1px solid rgba(255,209,102,0.4);
    border-radius: 8px;
    color: #fff;
    font-size: 1.05rem;
    padding: 6px 10px;
    cursor: pointer;
  }
  #stage { flex: 1; position: relative; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(11, 31, 58, 0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 12px; padding: 20px;
  }
  .overlay h2 { color: #ffd166; font-size: 1.4rem; }
  .overlay p { font-size: 0.9rem; opacity: 0.9; max-width: 300px; }
  .overlay button {
    background: #e63946; color: #fff; border: none;
    border-radius: 10px; font-size: 1.1rem; font-weight: 700;
    padding: 12px 28px; cursor: pointer;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <a href="index.html">‹ Games</a>
  <span class="hud">🎁 <span id="score">0</span> &nbsp; ❤️ <span id="lives">3</span></span>
  <button class="mute" id="muteBtn" aria-label="Mute game sound">🔊</button>
</header>
<div id="stage">
  <canvas id="game"></canvas>
  <div class="overlay" id="startOverlay">
    <h2>🎁 Catch the Gift</h2>
    <p>Drag Santa's bag to catch falling gifts. Stars are worth 3. Don't catch the coal!</p>
    <button id="startBtn">Play</button>
  </div>
  <div class="overlay hidden" id="gameOverOverlay">
    <h2>Game Over!</h2>
    <p>You caught <span id="finalScore">0</span> points of presents!</p>
    <button id="restartBtn">Play Again</button>
  </div>
</div>
<script>
(function () {
  'use strict';

  /* ---------- Audio (self-muting, never touches device volume) ---------- */
  var AudioFX = (function () {
    var ctx = null;
    var muted = localStorage.getItem('lclMuted') === '1';
    function ensure() {
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; }
      }
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    function beep(freq, dur, type, vol) {
      if (muted) return;
      ensure();
      if (!ctx) return;
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (dur || 0.12));
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + (dur || 0.12));
    }
    return {
      unlock: ensure,
      good: function () { beep(880, 0.1, 'square'); },
      star: function () { beep(988, 0.08, 'square'); setTimeout(function () { beep(1319, 0.12, 'square'); }, 70); },
      bad: function () { beep(160, 0.25, 'sawtooth', 0.08); },
      over: function () { beep(392, 0.2, 'triangle'); setTimeout(function () { beep(262, 0.35, 'triangle'); }, 180); },
      toggle: function () {
        muted = !muted;
        localStorage.setItem('lclMuted', muted ? '1' : '0');
        return muted;
      },
      isMuted: function () { return muted; }
    };
  })();

  var muteBtn = document.getElementById('muteBtn');
  function paintMute() { muteBtn.textContent = AudioFX.isMuted() ? '🔇' : '🔊'; }
  muteBtn.addEventListener('click', function () { AudioFX.toggle(); paintMute(); });
  paintMute();

  /* ---------- Game ---------- */
  var canvas = document.getElementById('game');
  var g = canvas.getContext('2d');
  var stage = document.getElementById('stage');
  var W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth; H = stage.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  var running = false, raf = 0, lastT = 0;
  var score = 0, lives = 3, spawnTimer = 0, elapsed = 0;
  var bagX = 0, bagW = 74;
  var items = [];
  var TYPES = [
    { emoji: '🎁', pts: 1, w: 0.72 },
    { emoji: '⭐', pts: 3, w: 0.10 },
    { emoji: '⚫', pts: -1, w: 0.18 }
  ];

  function pickType() {
    var r = Math.random(), acc = 0;
    for (var i = 0; i < TYPES.length; i++) {
      acc += TYPES[i].w;
      if (r <= acc) return TYPES[i];
    }
    return TYPES[0];
  }

  function reset() {
    score = 0; lives = 3; items = []; elapsed = 0; spawnTimer = 0;
    bagX = W / 2;
    document.getElementById('score').textContent = '0';
    document.getElementById('lives').textContent = '3';
  }

  function spawn() {
    var t = pickType();
    items.push({
      x: 24 + Math.random() * (W - 48),
      y: -30,
      vy: 110 + Math.random() * 60 + Math.min(elapsed * 6, 160),
      type: t,
      size: 30
    });
  }

  function update(dt) {
    elapsed += dt;
    spawnTimer -= dt;
    var interval = Math.max(0.35, 1.0 - elapsed * 0.012);
    if (spawnTimer <= 0) { spawn(); spawnTimer = interval; }

    var bagY = H - 46;
    for (var i = items.length - 1; i >= 0; i--) {
      var it = items[i];
      it.y += it.vy * dt;
      var caught = it.y > bagY - 16 && it.y < bagY + 26 && Math.abs(it.x - bagX) < bagW / 2 + 10;
      if (caught) {
        if (it.type.pts > 0) {
          score += it.type.pts;
          if (it.type.pts >= 3) { AudioFX.star(); } else { AudioFX.good(); }
        } else {
          lives -= 1;
          AudioFX.bad();
        }
        items.splice(i, 1);
      } else if (it.y > H + 40) {
        items.splice(i, 1);
      }
    }
    document.getElementById('score').textContent = String(score);
    document.getElementById('lives').textContent = String(Math.max(lives, 0));
    if (lives <= 0) gameOver();
  }

  function draw() {
    g.clearRect(0, 0, W, H);
    /* snow dots */
    g.fillStyle = 'rgba(255,255,255,0.35)';
    for (var s = 0; s < 22; s++) {
      var sx = (s * 97 + elapsed * 24) % W;
      var sy = (s * 61 + elapsed * 42) % H;
      g.fillRect(sx, sy, 2, 2);
    }
    g.font = '28px serif';
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    for (var i = 0; i < items.length; i++) {
      g.fillText(items[i].type.emoji, items[i].x, items[i].y);
    }
    /* bag */
    var bagY = H - 46;
    g.font = '46px serif';
    g.fillText('🛍️', bagX, bagY);
    /* ground */
    g.fillStyle = 'rgba(255,255,255,0.85)';
    g.fillRect(0, H - 12, W, 12);
  }

  function loop(t) {
    if (!running) return;
    var dt = Math.min((t - lastT) / 1000, 0.05);
    lastT = t;
    update(dt);
    draw();
    raf = requestAnimationFrame(loop);
  }

  function start() {
    reset();
    running = true;
    lastT = performance.now();
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
    raf = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(raf);
    AudioFX.over();
    document.getElementById('finalScore').textContent = String(score);
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  }

  /* input */
  function moveTo(clientX) {
    var r = stage.getBoundingClientRect();
    bagX = Math.max(24, Math.min(W - 24, clientX - r.left));
  }
  stage.addEventListener('touchstart', function (e) { AudioFX.unlock(); moveTo(e.touches[0].clientX); }, { passive: true });
  stage.addEventListener('touchmove', function (e) { moveTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  stage.addEventListener('mousemove', function (e) { moveTo(e.clientX); });

  document.getElementById('startBtn').addEventListener('click', function () { AudioFX.unlock(); start(); });
  document.getElementById('restartBtn').addEventListener('click', function () { AudioFX.unlock(); start(); });

  document.addEventListener('visibilitychange', function () {
    if (document.hidden && running) {
      running = false;
      cancelAnimationFrame(raf);
      document.getElementById('startOverlay').classList.remove('hidden');
    }
  });
})();
</script>
</body>
</html>
