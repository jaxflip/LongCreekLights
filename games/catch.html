<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Santa's Sack Catch — Long Creek Lights</title>
<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 50% -20%, #1d4a7a 0%, transparent 55%),
      linear-gradient(180deg, #071426 0%, #0b2818 100%);
    color: #f5f7fa;
    font-family: 'Nunito', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    touch-action: none;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 4px;
    font-size: 0.95rem;
    position: relative; z-index: 2;
  }
  header a { color: #ffd166; text-decoration: none; font-weight: 800; padding: 6px 10px; }
  .hud { font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
  button.mute {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,209,102,0.5);
    border-radius: 10px;
    color: #fff;
    font-size: 1.05rem;
    padding: 6px 10px;
    cursor: pointer;
  }
  .lights { display: flex; justify-content: center; gap: 12px; padding: 2px 0 6px; position: relative; z-index: 2; }
  .lights i { width: 8px; height: 8px; border-radius: 50%; display: block; animation: bulb 1.6s ease-in-out infinite; }
  .lights i:nth-child(5n+1) { background: #ff4d4d; box-shadow: 0 0 8px 2px rgba(255,77,77,0.9); }
  .lights i:nth-child(5n+2) { background: #ffd166; box-shadow: 0 0 8px 2px rgba(255,209,102,0.9); animation-delay: 0.3s; }
  .lights i:nth-child(5n+3) { background: #4dff88; box-shadow: 0 0 8px 2px rgba(77,255,136,0.9); animation-delay: 0.6s; }
  .lights i:nth-child(5n+4) { background: #4dc3ff; box-shadow: 0 0 8px 2px rgba(77,195,255,0.9); animation-delay: 0.9s; }
  .lights i:nth-child(5n+5) { background: #d24dff; box-shadow: 0 0 8px 2px rgba(210,77,255,0.9); animation-delay: 1.2s; }
  @keyframes bulb { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.85); } }
  #stage { flex: 1; position: relative; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(7, 20, 38, 0.9);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 12px; padding: 20px;
    z-index: 3;
  }
  .overlay h2 {
    font-family: 'Mountains of Christmas', cursive;
    color: #ffd166; font-size: 1.7rem;
    text-shadow: 0 0 16px rgba(255,209,102,0.4);
  }
  .overlay p { font-size: 0.92rem; opacity: 0.9; max-width: 300px; line-height: 1.5; }
  .overlay button {
    background: linear-gradient(180deg, #ff5b67, #d92637);
    color: #fff; border: none;
    border-radius: 12px; font-size: 1.15rem; font-weight: 800;
    padding: 13px 34px; cursor: pointer;
    box-shadow: 0 5px 16px rgba(217,38,55,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <a href="index.html">‹ Games</a>
  <span class="hud">🎁 <span id="score">0</span> &nbsp; <span id="livesHud">❤️❤️❤️</span></span>
  <button class="mute" id="muteBtn" aria-label="Mute game sound">🔊</button>
</header>
<div class="lights"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
<div id="stage">
  <canvas id="game"></canvas>
  <div class="overlay" id="startOverlay">
    <h2>🎅 Santa's Sack Catch</h2>
    <p>It's snowing presents at the North Pole! Drag Santa's magic sack through the blizzard. Catch <b>wrapped gifts</b> and <b>gold stars (×3)</b> — but dodge the <b>lump of coal</b> or you're off the Nice List!</p>
    <button id="startBtn">Play</button>
  </div>
  <div class="overlay hidden" id="gameOverOverlay">
    <h2 id="overTitle">Game Over!</h2>
    <p>You caught <b><span id="finalScore">0</span></b> points of presents!<br><span id="bestLine"></span></p>
    <button id="restartBtn">Play Again</button>
  </div>
</div>
<script>
(function () {
  'use strict';

  /* ---------- Audio (game-only mute; never touches device volume) ---------- */
  var AudioFX = (function () {
    var ctx = null;
    var muted = localStorage.getItem('lclMuted') === '1';
    function ensure() {
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; }
      }
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    function beep(freq, dur, type, vol) {
      if (muted) return;
      ensure();
      if (!ctx) return;
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (dur || 0.12));
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + (dur || 0.12));
    }
    return {
      unlock: ensure,
      good: function () { beep(880, 0.1, 'square'); },
      star: function () { beep(988, 0.08, 'square'); setTimeout(function () { beep(1319, 0.12, 'square'); }, 70); },
      bad: function () { beep(160, 0.25, 'sawtooth', 0.08); },
      over: function () { beep(392, 0.2, 'triangle'); setTimeout(function () { beep(262, 0.35, 'triangle'); }, 180); },
      toggle: function () {
        muted = !muted;
        localStorage.setItem('lclMuted', muted ? '1' : '0');
        return muted;
      },
      isMuted: function () { return muted; }
    };
  })();

  var muteBtn = document.getElementById('muteBtn');
  function paintMute() { muteBtn.textContent = AudioFX.isMuted() ? '🔇' : '🔊'; }
  muteBtn.addEventListener('click', function () { AudioFX.toggle(); paintMute(); });
  paintMute();

  /* ---------- Setup ---------- */
  var canvas = document.getElementById('game');
  var g = canvas.getContext('2d');
  var stage = document.getElementById('stage');
  var W = 0, H = 0, DPR = 1;
  var stars = [], flakes = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth; H = stage.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    stars = [];
    for (var i = 0; i < 30; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H * 0.75, r: Math.random() * 1.4 + 0.5, p: Math.random() * Math.PI * 2 });
    }
    flakes = [];
    for (var j = 0; j < 30; j++) {
      flakes.push({ x: Math.random() * W, y: Math.random() * H, r: 1 + Math.random() * 2.2, v: 20 + Math.random() * 35, drift: Math.random() * Math.PI * 2 });
    }
  }
  window.addEventListener('resize', resize);
  resize();

  var GIFT_COLORS = [
    ['#e63946', '#ffd166'], ['#2a9d54', '#f8f9fb'], ['#4361ee', '#ffd166'],
    ['#9b5de5', '#f8f9fb'], ['#f77f00', '#f8f9fb']
  ];

  var running = false, raf = 0, lastT = 0;
  var score = 0, lives = 3, spawnTimer = 0, elapsed = 0, shake = 0;
  var bagX = 0, bagW = 84;
  var items = [], particles = [], floats = [];
  var best = parseInt(localStorage.getItem('lclCatchBest') || '0', 10);

  function pickType() {
    var r = Math.random();
    if (r < 0.10) return 'star';
    if (r < 0.28) return 'coal';
    return 'gift';
  }

  function reset() {
    score = 0; lives = 3; items = []; particles = []; floats = []; elapsed = 0; spawnTimer = 0; shake = 0;
    bagX = W / 2;
    document.getElementById('score').textContent = '0';
    paintLives();
  }

  function paintLives() {
    var s = '';
    for (var i = 0; i < 3; i++) s += i < lives ? '❤️' : '🖤';
    document.getElementById('livesHud').textContent = s;
  }

  function spawn() {
    var t = pickType();
    items.push({
      x: 26 + Math.random() * (W - 52),
      y: -30,
      vy: 110 + Math.random() * 60 + Math.min(elapsed * 6, 170),
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 3,
      type: t,
      colors: GIFT_COLORS[Math.floor(Math.random() * GIFT_COLORS.length)]
    });
  }

  function burst(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, sp = 50 + Math.random() * 110;
      particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 0.55 + Math.random() * 0.3, t: 0, c: color, r: 2 + Math.random() * 2.5 });
    }
  }

  function update(dt) {
    elapsed += dt;
    spawnTimer -= dt;
    if (shake > 0) shake -= dt * 3;
    var interval = Math.max(0.34, 1.0 - elapsed * 0.012);
    if (spawnTimer <= 0) { spawn(); spawnTimer = interval; }

    for (var f = 0; f < flakes.length; f++) {
      var fl = flakes[f];
      fl.y += fl.v * dt;
      fl.x += Math.sin(elapsed * 1.3 + fl.drift) * 12 * dt;
      if (fl.y > H + 4) { fl.y = -4; fl.x = Math.random() * W; }
    }

    var bagY = H - 52;
    for (var i = items.length - 1; i >= 0; i--) {
      var it = items[i];
      it.y += it.vy * dt;
      it.rot += it.vr * dt;
      var caught = it.y > bagY - 20 && it.y < bagY + 28 && Math.abs(it.x - bagX) < bagW / 2 + 12;
      if (caught) {
        if (it.type === 'gift') {
          score += 1;
          AudioFX.good();
          burst(it.x, it.y, it.colors[0], 10);
          floats.push({ x: it.x, y: it.y, t: 0, txt: '+1', c: '#ffd166' });
        } else if (it.type === 'star') {
          score += 3;
          AudioFX.star();
          burst(it.x, it.y, '#ffd166', 18);
          floats.push({ x: it.x, y: it.y, t: 0, txt: '+3!', c: '#ffe9a8' });
        } else {
          lives -= 1;
          shake = 1;
          AudioFX.bad();
          burst(it.x, it.y, '#555b63', 14);
          floats.push({ x: it.x, y: it.y, t: 0, txt: 'COAL!', c: '#ff7b85' });
          paintLives();
        }
        document.getElementById('score').textContent = String(score);
        items.splice(i, 1);
      } else if (it.y > H + 40) {
        items.splice(i, 1);
      }
    }
    if (lives <= 0) gameOver();
  }

  /* ---------- Drawing ---------- */
  function drawGift(it) {
    var s = 26;
    g.save();
    g.translate(it.x, it.y);
    g.rotate(Math.sin(it.rot) * 0.25);
    g.fillStyle = it.colors[0];
    g.fillRect(-s / 2, -s / 2, s, s);
    g.fillStyle = it.colors[1];
    g.fillRect(-s / 2, -4, s, 8);
    g.fillRect(-4, -s / 2, 8, s);
    /* bow */
    g.beginPath();
    g.arc(-6, -s / 2 - 4, 5, 0, Math.PI * 2);
    g.arc(6, -s / 2 - 4, 5, 0, Math.PI * 2);
    g.fill();
    g.strokeStyle = 'rgba(0,0,0,0.25)';
    g.lineWidth = 1;
    g.strokeRect(-s / 2, -s / 2, s, s);
    g.restore();
  }

  function drawStar(it, t) {
    var R = 15, r = 6.5;
    g.save();
    g.translate(it.x, it.y);
    g.rotate(it.rot * 0.6);
    var halo = g.createRadialGradient(0, 0, 2, 0, 0, R * 2.4);
    halo.addColorStop(0, 'rgba(255,224,130,0.65)');
    halo.addColorStop(1, 'rgba(255,224,130,0)');
    g.fillStyle = halo;
    g.beginPath(); g.arc(0, 0, R * 2.4, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#ffd166';
    g.beginPath();
    for (var i = 0; i < 10; i++) {
      var rad = i % 2 === 0 ? R : r;
      var a = i * Math.PI / 5 - Math.PI / 2;
      g.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
    }
    g.closePath();
    g.fill();
    g.strokeStyle = '#c98a00';
    g.lineWidth = 1;
    g.stroke();
    g.restore();
  }

  function drawCoal(it) {
    g.save();
    g.translate(it.x, it.y);
    g.rotate(it.rot);
    g.fillStyle = '#2b2f36';
    g.beginPath();
    g.moveTo(-12, -4); g.lineTo(-5, -12); g.lineTo(7, -10);
    g.lineTo(13, 0); g.lineTo(8, 11); g.lineTo(-7, 12); g.lineTo(-13, 5);
    g.closePath();
    g.fill();
    g.fillStyle = 'rgba(255,255,255,0.12)';
    g.beginPath(); g.arc(-4, -4, 3.5, 0, Math.PI * 2); g.fill();
    g.strokeStyle = '#14161a';
    g.lineWidth = 1.5;
    g.stroke();
    g.restore();
  }

  function drawSack(x, y) {
    g.save();
    g.translate(x, y);
    /* sack body */
    var grad = g.createLinearGradient(0, -34, 0, 26);
    grad.addColorStop(0, '#c8323f');
    grad.addColorStop(1, '#8f1f2b');
    g.fillStyle = grad;
    g.beginPath();
    g.moveTo(-bagW / 2, 22);
    g.quadraticCurveTo(-bagW / 2 - 8, -12, -16, -26);
    g.lineTo(16, -26);
    g.quadraticCurveTo(bagW / 2 + 8, -12, bagW / 2, 22);
    g.quadraticCurveTo(0, 32, -bagW / 2, 22);
    g.closePath();
    g.fill();
    /* rim / opening */
    g.fillStyle = '#ffd166';
    g.beginPath();
    g.ellipse(0, -26, 20, 7, 0, 0, Math.PI * 2);
    g.fill();
    g.fillStyle = '#5c1119';
    g.beginPath();
    g.ellipse(0, -26, 15, 4.5, 0, 0, Math.PI * 2);
    g.fill();
    /* stitch highlight */
    g.strokeStyle = 'rgba(255,209,102,0.6)';
    g.lineWidth = 2;
    g.setLineDash([4, 5]);
    g.beginPath();
    g.moveTo(-bagW / 2 + 8, 16);
    g.quadraticCurveTo(0, 24, bagW / 2 - 8, 16);
    g.stroke();
    g.setLineDash([]);
    g.restore();
  }

  function draw(t) {
    g.save();
    if (shake > 0) g.translate((Math.random() - 0.5) * 7 * shake, (Math.random() - 0.5) * 7 * shake);

    var sky = g.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a1c33');
    sky.addColorStop(0.75, '#123252');
    sky.addColorStop(1, '#0c2b1c');
    g.fillStyle = sky;
    g.fillRect(-10, -10, W + 20, H + 20);

    /* moon */
    var mg = g.createRadialGradient(W - 60, 62, 6, W - 60, 62, 46);
    mg.addColorStop(0, 'rgba(255,248,220,0.95)');
    mg.addColorStop(0.35, 'rgba(255,248,220,0.5)');
    mg.addColorStop(1, 'rgba(255,248,220,0)');
    g.fillStyle = mg;
    g.beginPath(); g.arc(W - 60, 62, 46, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#fff6d8';
    g.beginPath(); g.arc(W - 60, 62, 17, 0, Math.PI * 2); g.fill();

    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      g.globalAlpha = 0.35 + 0.65 * Math.abs(Math.sin(t / 850 + s.p));
      g.fillStyle = '#ffffff';
      g.beginPath(); g.arc(s.x, s.y, s.r, 0, Math.PI * 2); g.fill();
    }
    g.globalAlpha = 1;

    /* ambient snow */
    g.fillStyle = 'rgba(255,255,255,0.75)';
    for (var f = 0; f < flakes.length; f++) {
      g.beginPath(); g.arc(flakes[f].x, flakes[f].y, flakes[f].r, 0, Math.PI * 2); g.fill();
    }

    /* snowy ground */
    g.fillStyle = '#eef4fb';
    g.beginPath();
    g.moveTo(0, H - 18);
    g.quadraticCurveTo(W * 0.25, H - 30, W * 0.5, H - 20);
    g.quadraticCurveTo(W * 0.75, H - 10, W, H - 22);
    g.lineTo(W, H); g.lineTo(0, H);
    g.closePath();
    g.fill();

    /* snowy pine trees */
    function miniTree(tx, by, sc) {
      g.save(); g.translate(tx, by); g.scale(sc, sc);
      g.fillStyle = '#1a5c32';
      g.beginPath(); g.moveTo(0, -20); g.lineTo(-12, 0); g.lineTo(12, 0); g.closePath(); g.fill();
      g.beginPath(); g.moveTo(0, -12); g.lineTo(-15, 6); g.lineTo(15, 6); g.closePath(); g.fill();
      g.fillStyle = '#5c3d1e'; g.fillRect(-3, 6, 6, 7);
      g.fillStyle = '#ffd166'; g.beginPath(); g.arc(-5, -2, 2.5, 0, Math.PI * 2); g.fill();
      g.restore();
    }
    miniTree(36, H - 22, 1.1);
    miniTree(W - 42, H - 20, 0.95);
    miniTree(W * 0.5, H - 18, 1.25);

    /* items */
    for (var k = 0; k < items.length; k++) {
      var it = items[k];
      if (it.type === 'gift') drawGift(it);
      else if (it.type === 'star') drawStar(it, t);
      else drawCoal(it);
    }

    drawSack(bagX, H - 52);

    /* particles */
    for (var p = 0; p < particles.length; p++) {
      var pt = particles[p];
      g.globalAlpha = 1 - pt.t / pt.life;
      g.fillStyle = pt.c;
      g.beginPath(); g.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2); g.fill();
    }
    g.globalAlpha = 1;

    /* floating score text */
    g.font = "800 17px Nunito, sans-serif";
    g.textAlign = 'center';
    for (var q = 0; q < floats.length; q++) {
      var fl2 = floats[q];
      g.globalAlpha = 1 - fl2.t / 0.9;
      g.fillStyle = fl2.c;
      g.fillText(fl2.txt, fl2.x, fl2.y - fl2.t * 46);
    }
    g.globalAlpha = 1;
    g.restore();
  }

  function stepFx(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.t += dt;
      if (p.t >= p.life) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 160 * dt;
    }
    for (var j = floats.length - 1; j >= 0; j--) {
      floats[j].t += dt;
      if (floats[j].t >= 0.9) floats.splice(j, 1);
    }
  }

  function loop(t) {
    if (!running) return;
    var dt = Math.min((t - lastT) / 1000, 0.05);
    lastT = t;
    update(dt);
    stepFx(dt);
    draw(t);
    raf = requestAnimationFrame(loop);
  }

  function start() {
    reset();
    running = true;
    lastT = performance.now();
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
    raf = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(raf);
    AudioFX.over();
    var bestLine = '';
    if (score > best) {
      best = score;
      localStorage.setItem('lclCatchBest', String(best));
      document.getElementById('overTitle').textContent = '🏆 New Best!';
      bestLine = 'That’s a new personal best!';
    } else {
      document.getElementById('overTitle').textContent = 'Game Over!';
      bestLine = 'Best so far: ' + best;
    }
    document.getElementById('bestLine').textContent = bestLine;
    document.getElementById('finalScore').textContent = String(score);
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  }

  /* ---------- Input ---------- */
  function moveTo(clientX) {
    var r = stage.getBoundingClientRect();
    bagX = Math.max(30, Math.min(W - 30, clientX - r.left));
  }
  stage.addEventListener('touchstart', function (e) { AudioFX.unlock(); moveTo(e.touches[0].clientX); }, { passive: true });
  stage.addEventListener('touchmove', function (e) { moveTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  stage.addEventListener('mousemove', function (e) { moveTo(e.clientX); });

  document.getElementById('startBtn').addEventListener('click', function () { AudioFX.unlock(); start(); });
  document.getElementById('restartBtn').addEventListener('click', function () { AudioFX.unlock(); start(); });

  document.addEventListener('visibilitychange', function () {
    if (document.hidden && running) {
      running = false;
      cancelAnimationFrame(raf);
      document.getElementById('startOverlay').classList.remove('hidden');
    }
  });
})();
</script>
</body>
</html>
