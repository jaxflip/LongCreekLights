<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Santa's Light Trail — Long Creek Lights</title>
<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 50% -20%, #1d4a7a 0%, transparent 55%),
      linear-gradient(180deg, #071426 0%, #0b2818 100%);
    color: #f5f7fa;
    font-family: 'Nunito', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    touch-action: none;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 4px;
    font-size: 0.95rem;
    position: relative; z-index: 2;
  }
  header a { color: #ffd166; text-decoration: none; font-weight: 800; padding: 6px 10px; }
  .hud { font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
  button.mute {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,209,102,0.5);
    border-radius: 10px;
    color: #fff;
    font-size: 1.05rem;
    padding: 6px 10px;
    cursor: pointer;
  }
  .lights { display: flex; justify-content: center; gap: 12px; padding: 2px 0 6px; position: relative; z-index: 2; }
  .lights i { width: 8px; height: 8px; border-radius: 50%; display: block; animation: bulb 1.6s ease-in-out infinite; }
  .lights i:nth-child(5n+1) { background: #ff4d4d; box-shadow: 0 0 8px 2px rgba(255,77,77,0.9); }
  .lights i:nth-child(5n+2) { background: #ffd166; box-shadow: 0 0 8px 2px rgba(255,209,102,0.9); animation-delay: 0.3s; }
  .lights i:nth-child(5n+3) { background: #4dff88; box-shadow: 0 0 8px 2px rgba(77,255,136,0.9); animation-delay: 0.6s; }
  .lights i:nth-child(5n+4) { background: #4dc3ff; box-shadow: 0 0 8px 2px rgba(77,195,255,0.9); animation-delay: 0.9s; }
  .lights i:nth-child(5n+5) { background: #d24dff; box-shadow: 0 0 8px 2px rgba(210,77,255,0.9); animation-delay: 1.2s; }
  @keyframes bulb { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.85); } }
  #stage { flex: 1; position: relative; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(7, 20, 38, 0.9);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 12px; padding: 20px;
    z-index: 3;
  }
  .overlay h2 {
    font-family: 'Mountains of Christmas', cursive;
    color: #ffd166; font-size: 1.7rem;
    text-shadow: 0 0 16px rgba(255,209,102,0.4);
  }
  .overlay p { font-size: 0.92rem; opacity: 0.9; max-width: 300px; line-height: 1.5; }
  .overlay button {
    background: linear-gradient(180deg, #ff5b67, #d92637);
    color: #fff; border: none;
    border-radius: 12px; font-size: 1.15rem; font-weight: 800;
    padding: 13px 34px; cursor: pointer;
    box-shadow: 0 5px 16px rgba(217,38,55,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <a href="index.html">‹ Games</a>
  <span class="hud">🎄 <span id="score">0</span> &nbsp; 🏆 <span id="best">0</span></span>
  <button class="mute" id="muteBtn" aria-label="Mute game sound">🔊</button>
</header>
<div class="lights"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
<div id="stage">
  <canvas id="game"></canvas>
  <div class="overlay" id="startOverlay">
    <h2>🦌 Santa's Light Trail</h2>
    <p>Guide <b>Rudolph</b> through the snowy village! Swipe to steer and collect <b>holiday treats</b> — grow your string of Christmas lights without hitting the fence or your own tail!</p>
    <button id="startBtn">Play</button>
  </div>
  <div class="overlay hidden" id="gameOverOverlay">
    <h2 id="overTitle">Oh Deer!</h2>
    <p>Rudolph collected <b><span id="finalScore">0</span></b> holiday treats.</p>
    <button id="restartBtn">Play Again</button>
  </div>
</div>
<script>
(function () {
  'use strict';

  /* ---------- Audio (game-only mute; never touches device volume) ---------- */
  var AudioFX = (function () {
    var ctx = null;
    var muted = localStorage.getItem('lclMuted') === '1';
    function ensure() {
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; }
      }
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }
    function beep(freq, dur, type, vol) {
      if (muted) return;
      ensure();
      if (!ctx) return;
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (dur || 0.12));
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + (dur || 0.12));
    }
    return {
      unlock: ensure,
      eat: function () { beep(784, 0.08, 'square'); setTimeout(function () { beep(1047, 0.1, 'square'); }, 70); },
      crash: function () { beep(150, 0.3, 'sawtooth', 0.09); },
      toggle: function () {
        muted = !muted;
        localStorage.setItem('lclMuted', muted ? '1' : '0');
        return muted;
      },
      isMuted: function () { return muted; }
    };
  })();

  var muteBtn = document.getElementById('muteBtn');
  function paintMute() { muteBtn.textContent = AudioFX.isMuted() ? '🔇' : '🔊'; }
  muteBtn.addEventListener('click', function () { AudioFX.toggle(); paintMute(); });
  paintMute();

  /* ---------- Setup ---------- */
  var canvas = document.getElementById('game');
  var g = canvas.getContext('2d');
  var stage = document.getElementById('stage');
  var COLS = 15, ROWS = 22, CELL = 20, OX = 0, OY = 0, DPR = 1, VW = 0, VH = 0;
  var stars = [], flakes = [];
  var FOOD_TYPES = ['candy', 'cookie', 'ornament', 'star'];
  var BULB_COLORS = ['#ff4d4d', '#4dff88', '#ffd166', '#4dc3ff', '#d24dff'];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    VW = stage.clientWidth; VH = stage.clientHeight;
    canvas.width = VW * DPR; canvas.height = VH * DPR;
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    CELL = Math.floor(Math.min(VW / COLS, (VH - 8) / ROWS));
    OX = Math.floor((VW - COLS * CELL) / 2);
    OY = Math.floor((VH - ROWS * CELL) / 2);
    stars = [];
    for (var i = 0; i < 26; i++) {
      stars.push({ x: Math.random() * VW, y: Math.random() * VH * 0.65, r: Math.random() * 1.4 + 0.5, p: Math.random() * Math.PI * 2 });
    }
    flakes = [];
    for (var j = 0; j < 36; j++) {
      flakes.push({ x: Math.random() * VW, y: Math.random() * VH, r: 1 + Math.random() * 2.2, v: 18 + Math.random() * 32, drift: Math.random() * Math.PI * 2 });
    }
  }
  window.addEventListener('resize', resize);
  resize();

  var snake, dir, nextDir, food, score, best, timer, speed, running = false;
  var particles = [], floats = [], foodPulse = 0, animRaf = 0;
  best = parseInt(localStorage.getItem('lclSnakeBest') || '0', 10);
  document.getElementById('best').textContent = String(best);

  function placeFood() {
    while (true) {
      var f = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS),
        type: FOOD_TYPES[Math.floor(Math.random() * FOOD_TYPES.length)]
      };
      var clash = snake.some(function (s) { return s.x === f.x && s.y === f.y; });
      if (!clash) { food = f; return; }
    }
  }

  function reset() {
    snake = [{ x: 7, y: 11 }, { x: 6, y: 11 }, { x: 5, y: 11 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    speed = 6.5;
    particles = []; floats = [];
    document.getElementById('score').textContent = '0';
    placeFood();
  }

  function cellCX(c) { return OX + c * CELL + CELL / 2; }
  function cellCY(r) { return OY + r * CELL + CELL / 2; }

  function burst(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 90;
      particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.6 + Math.random() * 0.3, t: 0, c: color, r: 2 + Math.random() * 2 });
    }
  }

  function step() {
    dir = nextDir;
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
        snake.some(function (s) { return s.x === head.x && s.y === head.y; })) {
      return gameOver();
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 1;
      AudioFX.eat();
      document.getElementById('score').textContent = String(score);
      burst(cellCX(food.x), cellCY(food.y), '#ff5b67', 14);
      burst(cellCX(food.x), cellCY(food.y), '#ffffff', 8);
      floats.push({ x: cellCX(food.x), y: cellCY(food.y), t: 0, txt: '+1' });
      if (score % 5 === 0 && speed < 13) speed += 1;
      placeFood();
    } else {
      snake.pop();
    }
    timer = setTimeout(step, 1000 / speed);
  }

  /* ---------- Drawing ---------- */
  function drawTree(tx, by, scale) {
    g.save();
    g.translate(tx, by);
    g.scale(scale, scale);
    g.fillStyle = '#1a5c32';
    g.beginPath();
    g.moveTo(0, -28); g.lineTo(-18, 0); g.lineTo(18, 0); g.closePath(); g.fill();
    g.beginPath();
    g.moveTo(0, -18); g.lineTo(-22, 8); g.lineTo(22, 8); g.closePath(); g.fill();
    g.beginPath();
    g.moveTo(0, -8); g.lineTo(-26, 18); g.lineTo(26, 18); g.closePath(); g.fill();
    g.fillStyle = '#5c3d1e';
    g.fillRect(-5, 18, 10, 10);
    g.fillStyle = '#ffd166';
    g.beginPath(); g.arc(-8, -4, 3, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#e63946';
    g.beginPath(); g.arc(10, -12, 3, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#4dc3ff';
    g.beginPath(); g.arc(0, 2, 3, 0, Math.PI * 2); g.fill();
    g.restore();
  }

  function drawBackdrop(t) {
    var sky = g.createLinearGradient(0, 0, 0, VH);
    sky.addColorStop(0, '#0a1530');
    sky.addColorStop(0.45, '#0f2848');
    sky.addColorStop(1, '#0c2b1c');
    g.fillStyle = sky;
    g.fillRect(0, 0, VW, VH);
    /* aurora */
    g.globalAlpha = 0.22 + 0.08 * Math.sin(t / 1400);
    var aur = g.createLinearGradient(0, 0, VW, VH * 0.4);
    aur.addColorStop(0, 'rgba(77,255,136,0)');
    aur.addColorStop(0.4, 'rgba(77,195,255,0.35)');
    aur.addColorStop(0.7, 'rgba(210,77,255,0.25)');
    aur.addColorStop(1, 'rgba(77,255,136,0)');
    g.fillStyle = aur;
    g.fillRect(0, 0, VW, VH * 0.55);
    g.globalAlpha = 1;
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      g.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t / 900 + s.p));
      g.fillStyle = '#ffffff';
      g.beginPath();
      g.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      g.fill();
    }
    g.globalAlpha = 1;
    /* snowflakes */
    g.fillStyle = 'rgba(255,255,255,0.85)';
    for (var fi = 0; fi < flakes.length; fi++) {
      var fl = flakes[fi];
      g.beginPath(); g.arc(fl.x, fl.y, fl.r, 0, Math.PI * 2); g.fill();
    }
    /* snowy village along board bottom */
    var groundY = OY + ROWS * CELL + 6;
    var snow = g.createLinearGradient(0, groundY - 20, 0, VH);
    snow.addColorStop(0, 'rgba(230,245,255,0.35)');
    snow.addColorStop(1, 'rgba(200,220,240,0.12)');
    g.fillStyle = snow;
    g.fillRect(OX - 8, groundY - 4, COLS * CELL + 16, VH - groundY + 8);
    drawTree(OX - 4, groundY + 2, 0.55);
    drawTree(OX + COLS * CELL + 4, groundY + 2, 0.5);
    drawTree(OX + COLS * CELL * 0.5, groundY + 4, 0.65);
    /* frosty play field */
    g.fillStyle = 'rgba(255,255,255,0.06)';
    g.fillRect(OX, OY, COLS * CELL, ROWS * CELL);
    g.strokeStyle = 'rgba(255,255,255,0.05)';
    g.lineWidth = 1;
    for (var c = 1; c < COLS; c++) {
      g.beginPath(); g.moveTo(OX + c * CELL, OY); g.lineTo(OX + c * CELL, OY + ROWS * CELL); g.stroke();
    }
    for (var r = 1; r < ROWS; r++) {
      g.beginPath(); g.moveTo(OX, OY + r * CELL); g.lineTo(OX + COLS * CELL, OY + r * CELL); g.stroke();
    }
    /* garland border */
    g.strokeStyle = 'rgba(255,209,102,0.75)';
    g.lineWidth = 3;
    g.strokeRect(OX + 1, OY + 1, COLS * CELL - 2, ROWS * CELL - 2);
    g.strokeStyle = 'rgba(230,57,70,0.5)';
    g.lineWidth = 1;
    g.strokeRect(OX + 4, OY + 4, COLS * CELL - 8, ROWS * CELL - 8);
  }

  function drawBulb(x, y, color, glow) {
    var r = CELL * 0.38;
    if (glow) {
      g.shadowColor = color;
      g.shadowBlur = 14;
    }
    g.fillStyle = color;
    g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.fill();
    g.shadowBlur = 0;
    g.fillStyle = 'rgba(255,255,255,0.55)';
    g.beginPath(); g.arc(x - r * 0.28, y - r * 0.28, r * 0.22, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#3d3d3d';
    g.fillRect(x - r * 0.22, y + r * 0.55, r * 0.44, r * 0.35);
  }

  function drawFood(t) {
    if (!food) return;
    var x = cellCX(food.x), y = cellCY(food.y);
    var pulse = 1 + 0.16 * Math.sin(t / 180);
    var R = CELL * 0.42 * pulse;
    var halo = g.createRadialGradient(x, y, R * 0.3, x, y, R * 2.8);
    halo.addColorStop(0, 'rgba(255,209,102,0.6)');
    halo.addColorStop(1, 'rgba(255,209,102,0)');
    g.fillStyle = halo;
    g.beginPath(); g.arc(x, y, R * 2.8, 0, Math.PI * 2); g.fill();
    if (food.type === 'candy') {
      g.fillStyle = '#ffffff';
      g.beginPath(); g.arc(x, y, R, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#e63946';
      var spin = t / 1200;
      for (var i = 0; i < 4; i++) {
        var a0 = spin + i * Math.PI / 2, a1 = a0 + Math.PI / 5;
        g.beginPath(); g.moveTo(x, y); g.arc(x, y, R, a0, a1); g.closePath(); g.fill();
      }
    } else if (food.type === 'cookie') {
      g.fillStyle = '#c68642';
      g.beginPath(); g.arc(x, y, R, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#f8f9fb';
      for (var ci = 0; ci < 5; ci++) {
        var ca = ci * 1.2 + t / 2000;
        g.beginPath(); g.arc(x + Math.cos(ca) * R * 0.45, y + Math.sin(ca) * R * 0.45, R * 0.14, 0, Math.PI * 2); g.fill();
      }
    } else if (food.type === 'ornament') {
      g.fillStyle = '#e63946';
      g.beginPath(); g.arc(x, y, R, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#ffd166';
      g.fillRect(x - R * 0.12, y - R * 1.1, R * 0.24, R * 0.35);
      g.strokeStyle = 'rgba(255,255,255,0.5)';
      g.lineWidth = 2;
      g.beginPath(); g.moveTo(x - R * 0.5, y); g.lineTo(x + R * 0.5, y); g.stroke();
    } else {
      g.fillStyle = '#ffd166';
      g.beginPath();
      for (var si = 0; si < 10; si++) {
        var rad = si % 2 === 0 ? R : R * 0.42;
        var a = si * Math.PI / 5 - Math.PI / 2 + t / 3000;
        g.lineTo(x + Math.cos(a) * rad, y + Math.sin(a) * rad);
      }
      g.closePath(); g.fill();
    }
  }

  function drawSnake(t) {
    if (!snake) return;
    /* wire between bulbs */
    g.strokeStyle = 'rgba(60,60,60,0.7)';
    g.lineWidth = 2;
    g.beginPath();
    for (var w = snake.length - 1; w >= 0; w--) {
      var wp = snake[w];
      var wx = cellCX(wp.x), wy = cellCY(wp.y);
      if (w === snake.length - 1) g.moveTo(wx, wy);
      else g.lineTo(wx, wy);
    }
    g.stroke();
    /* body: glowing Christmas light bulbs */
    for (var i = snake.length - 1; i >= 1; i--) {
      var s = snake[i];
      var flicker = 0.85 + 0.15 * Math.sin(t / 200 + i * 0.8);
      drawBulb(cellCX(s.x), cellCY(s.y), BULB_COLORS[i % BULB_COLORS.length], flicker > 0.92);
    }
    /* head: Rudolph */
    var h = snake[0];
    var hx = cellCX(h.x), hy = cellCY(h.y), hr = CELL * 0.48;
    var fur = g.createRadialGradient(hx - hr * 0.2, hy - hr * 0.2, hr * 0.15, hx, hy, hr);
    fur.addColorStop(0, '#c68642');
    fur.addColorStop(1, '#8b5a2b');
    g.fillStyle = fur;
    g.beginPath(); g.arc(hx, hy, hr, 0, Math.PI * 2); g.fill();
    /* antlers */
    g.strokeStyle = '#5c3d1e';
    g.lineWidth = 2.5;
    g.beginPath();
    g.moveTo(hx - hr * 0.5, hy - hr * 0.55); g.lineTo(hx - hr * 0.9, hy - hr * 1.1); g.lineTo(hx - hr * 0.35, hy - hr * 0.75);
    g.moveTo(hx + hr * 0.5, hy - hr * 0.55); g.lineTo(hx + hr * 0.9, hy - hr * 1.1); g.lineTo(hx + hr * 0.35, hy - hr * 0.75);
    g.stroke();
    /* glowing red nose */
    var noseGlow = g.createRadialGradient(hx, hy + hr * 0.35, 1, hx, hy + hr * 0.35, hr * 0.9);
    noseGlow.addColorStop(0, 'rgba(255,80,80,0.9)');
    noseGlow.addColorStop(1, 'rgba(255,80,80,0)');
    g.fillStyle = noseGlow;
    g.beginPath(); g.arc(hx, hy + hr * 0.35, hr * 0.9, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#ff3333';
    g.beginPath(); g.arc(hx, hy + hr * 0.35, hr * 0.22, 0, Math.PI * 2); g.fill();
    /* eyes */
    g.fillStyle = '#ffffff';
    g.beginPath(); g.arc(hx - hr * 0.28, hy - hr * 0.05, hr * 0.18, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(hx + hr * 0.28, hy - hr * 0.05, hr * 0.18, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#1a1a2e';
    g.beginPath(); g.arc(hx - hr * 0.24, hy - hr * 0.03, hr * 0.09, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(hx + hr * 0.32, hy - hr * 0.03, hr * 0.09, 0, Math.PI * 2); g.fill();
  }

  function drawFx(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.t += dt;
      if (p.t >= p.life) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 120 * dt;
      g.globalAlpha = 1 - p.t / p.life;
      g.fillStyle = p.c;
      g.beginPath(); g.arc(p.x, p.y, p.r, 0, Math.PI * 2); g.fill();
    }
    g.globalAlpha = 1;
    g.font = '800 16px Nunito, sans-serif';
    g.textAlign = 'center';
    for (var j = floats.length - 1; j >= 0; j--) {
      var f = floats[j];
      f.t += dt;
      if (f.t >= 0.9) { floats.splice(j, 1); continue; }
      g.globalAlpha = 1 - f.t / 0.9;
      g.fillStyle = '#ffd166';
      g.fillText(f.txt, f.x, f.y - f.t * 40);
    }
    g.globalAlpha = 1;
  }

  var lastAnim = 0, elapsed = 0;
  function animate(t) {
    var dt = Math.min((t - lastAnim) / 1000, 0.05) || 0.016;
    lastAnim = t;
    elapsed += dt;
    for (var fi = 0; fi < flakes.length; fi++) {
      var fl = flakes[fi];
      fl.y += fl.v * dt;
      fl.x += Math.sin(elapsed * 1.2 + fl.drift) * 10 * dt;
      if (fl.y > VH + 4) { fl.y = -4; fl.x = Math.random() * VW; }
    }
    drawBackdrop(t);
    if (food) drawFood(t);
    if (snake) drawSnake(t);
    drawFx(dt);
    animRaf = requestAnimationFrame(animate);
  }
  animRaf = requestAnimationFrame(animate);

  /* ---------- Flow ---------- */
  function start() {
    clearTimeout(timer);
    reset();
    running = true;
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
    timer = setTimeout(step, 1000 / speed);
  }

  function gameOver() {
    running = false;
    clearTimeout(timer);
    AudioFX.crash();
    burst(cellCX(snake[0].x), cellCY(snake[0].y), '#ffd166', 20);
    if (score > best) {
      best = score;
      localStorage.setItem('lclSnakeBest', String(best));
      document.getElementById('best').textContent = String(best);
      document.getElementById('overTitle').textContent = '🏆 New Best!';
    } else {
      document.getElementById('overTitle').textContent = 'Oh Deer!';
    }
    document.getElementById('finalScore').textContent = String(score);
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  }

  /* ---------- Input ---------- */
  var sx = 0, sy = 0;
  stage.addEventListener('touchstart', function (e) {
    AudioFX.unlock();
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
  }, { passive: true });
  stage.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
  stage.addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - sx;
    var dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
    var d;
    if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
    else d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  });
  document.addEventListener('keydown', function (e) {
    var map = {
      ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 }
    };
    var d = map[e.key];
    if (d && (d.x !== -dir.x || d.y !== -dir.y)) nextDir = d;
  });

  document.getElementById('startBtn').addEventListener('click', function () { AudioFX.unlock(); start(); });
  document.getElementById('restartBtn').addEventListener('click', function () { AudioFX.unlock(); start(); });

  document.addEventListener('visibilitychange', function () {
    if (document.hidden && running) {
      running = false;
      clearTimeout(timer);
      document.getElementById('startOverlay').classList.remove('hidden');
    }
  });

  reset(); /* so backdrop shows snake+candy behind the start overlay */
})();
</script>
</body>
</html>
