<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Long Creek Lights — House History</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; }
  html.embed, html.embed body { height: 100%; overflow: hidden; }
  body {
    background: #0b1f3a;
    color: #f5f7fa;
    font-family: 'Nunito', system-ui, sans-serif;
    text-align: center;
    padding: 8px 10px 12px;
  }
  .viewer {
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid rgba(255, 209, 102, 0.35);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
    background: #071426;
    aspect-ratio: 16 / 9;
    max-width: 520px;
    margin: 0 auto;
  }
  .photo {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .years {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
  .year-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 3rem;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 800;
    color: #ffd166;
    background: rgba(0, 0, 0, 0.32);
    border: 1px solid rgba(255, 209, 102, 0.35);
    border-radius: 999px;
    padding: 8px 12px;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    appearance: none;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .year-btn.is-active {
    border-color: #ffd166;
    background: rgba(212, 175, 55, 0.24);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.28);
    color: #fff;
  }
  .hint {
    margin-top: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(245, 247, 250, 0.65);
    line-height: 1.4;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>
  <div class="viewer">
    <img id="photo" class="photo"
         src="Long-Creek-Lights-Through-The-Years.gif"
         alt="Long Creek Lights house display progressing from 2014 through 2025"
         width="800" height="450">
  </div>
  <div class="years" id="years">
    <button type="button" class="year-btn is-active" data-year="slideshow">Slideshow</button>
    <button type="button" class="year-btn" data-year="2014">2014</button>
    <button type="button" class="year-btn" data-year="2016">2016</button>
    <button type="button" class="year-btn" data-year="2017">2017</button>
    <button type="button" class="year-btn" data-year="2018">2018</button>
    <button type="button" class="year-btn" data-year="2019">2019</button>
    <button type="button" class="year-btn" data-year="2020">2020</button>
    <button type="button" class="year-btn" data-year="2022">2022</button>
    <button type="button" class="year-btn" data-year="2023">2023</button>
    <button type="button" class="year-btn" data-year="2024">2024</button>
    <button type="button" class="year-btn" data-year="2025">2025</button>
  </div>
  <p class="hint">Tap a year to view that season, or Slideshow for the animated look back.</p>
<script>
(function () {
  'use strict';

  if (window.self !== window.top) {
    document.documentElement.classList.add('embed');
  }

  var slides = {
    slideshow: {
      src: 'Long-Creek-Lights-Through-The-Years.gif',
      alt: 'Long Creek Lights house display progressing from 2014 through 2025'
    },
    '2014': { src: '2014.jpg', alt: 'Long Creek Lights display in 2014' },
    '2016': { src: '2016.jpg', alt: 'Long Creek Lights display in 2016' },
    '2017': { src: '2017.jpg', alt: 'Long Creek Lights display in 2017' },
    '2018': { src: '2018.jpg', alt: 'Long Creek Lights display in 2018' },
    '2019': { src: '2019.jpg', alt: 'Long Creek Lights display in 2019' },
    '2020': { src: '2020.jpg', alt: 'Long Creek Lights display in 2020' },
    '2022': { src: '2022.jpg', alt: 'Long Creek Lights display in 2022' },
    '2023': { src: '2023.jpg', alt: 'Long Creek Lights display in 2023' },
    '2024': { src: '2024.jpg', alt: 'Long Creek Lights display in 2024' },
    '2025': { src: '2025.jpg', alt: 'Long Creek Lights display in 2025' }
  };

  var photo = document.getElementById('photo');
  var years = document.getElementById('years');

  function pickYear(year, btn) {
    var slide = slides[year];
    if (!slide || !photo) return;
    photo.src = slide.src;
    photo.alt = slide.alt;
    var active = years.querySelector('.year-btn.is-active');
    if (active) active.classList.remove('is-active');
    btn.classList.add('is-active');
  }

  years.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-year]');
    if (!btn) return;
    e.preventDefault();
    pickYear(btn.getAttribute('data-year'), btn);
  });
})();
</script>
</body>
</html>
