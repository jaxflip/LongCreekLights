<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Long Creek Lights — House History</title>
<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; }
  html.embed, html.embed body { height: 100%; overflow: hidden; }
  body {
    background: #0b1f3a;
    color: #f5f7fa;
    font-family: 'Nunito', system-ui, sans-serif;
    text-align: center;
    padding: 8px 10px 12px;
  }
  .viewer {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid rgba(255, 209, 102, 0.35);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
    background: #071426;
    aspect-ratio: 16 / 9;
    max-width: 520px;
    margin: 0 auto;
  }
  .year-wrap {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .year-wrap.is-active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }
  .year-wrap img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #071426;
  }
  .caption {
    position: absolute;
    top: 5%;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Mountains of Christmas', cursive;
    font-size: clamp(1.15rem, 4.8vw, 1.65rem);
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95);
    pointer-events: none;
    z-index: 2;
  }
  .caption span { display: block; }
  .years {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
  .year-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 3rem;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 800;
    color: #ffd166;
    background: rgba(0, 0, 0, 0.32);
    border: 1px solid rgba(255, 209, 102, 0.35);
    border-radius: 999px;
    padding: 8px 12px;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    appearance: none;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .year-btn.is-active {
    border-color: #ffd166;
    background: rgba(212, 175, 55, 0.24);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.28);
    color: #fff;
  }
  .hint {
    margin-top: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(245, 247, 250, 0.65);
    line-height: 1.4;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>
  <div class="viewer" id="viewer"></div>
  <div class="years" id="years">
    <button type="button" class="year-btn is-active" data-mode="slideshow">Slideshow</button>
  </div>
  <p class="hint">Tap a year to view that season, or Slideshow to auto-rotate through every year.</p>
<script>
(function () {
  'use strict';

  if (window.self !== window.top) {
    document.documentElement.classList.add('embed');
  }

  var YEARS = [2014, 2016, 2017, 2018, 2019, 2020, 2022, 2023, 2024, 2025];
  var viewer = document.getElementById('viewer');
  var years = document.getElementById('years');
  var timer = null;
  var slide = 0;

  YEARS.forEach(function (year) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'year-btn';
    btn.setAttribute('data-year', String(year));
    btn.textContent = String(year);
    years.appendChild(btn);

    var wrap = document.createElement('div');
    wrap.className = 'year-wrap';
    wrap.id = 'year-' + year;
    wrap.innerHTML =
      '<img src="' + year + '.jpg" alt="Long Creek Lights display in ' + year + '" width="800" height="450">' +
      '<div class="caption" aria-hidden="true"><span>Long Creek Lights</span><span>' + year + '</span></div>';
    viewer.appendChild(wrap);
  });

  function setActive(btn) {
    var active = years.querySelector('.year-btn.is-active');
    if (active) active.classList.remove('is-active');
    btn.classList.add('is-active');
  }

  function showYear(year) {
    viewer.querySelectorAll('.year-wrap').forEach(function (el) {
      el.classList.toggle('is-active', el.id === 'year-' + year);
    });
  }

  function startSlideshow() {
    stopSlideshow();
    slide = 0;
    showYear(YEARS[slide]);
    timer = setInterval(function () {
      slide = (slide + 1) % YEARS.length;
      showYear(YEARS[slide]);
    }, 4000);
  }

  function stopSlideshow() {
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
  }

  years.addEventListener('click', function (e) {
    var btn = e.target.closest('.year-btn');
    if (!btn) return;
    e.preventDefault();
    setActive(btn);
    if (btn.getAttribute('data-mode') === 'slideshow') {
      startSlideshow();
      return;
    }
    stopSlideshow();
    showYear(btn.getAttribute('data-year'));
  });

  startSlideshow();
})();
</script>
</body>
</html>
